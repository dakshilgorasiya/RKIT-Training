<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <script src="../../Scripts/jquery-3.5.1.js"></script>
    <link rel="stylesheet" href="../../Content/dx.light.css" />
    <script src="../../Scripts/dx.all.js"></script>
</head>
<body>
    <div id="grid"></div>

    <script>
        let store = new DevExpress.data.CustomStore({
            load: function (loadOptions) {
                return $.ajax({
                    url: "https://localhost:7051/api/Data/GetAllPost",
                    method: "GET"
                });
            }
        });

        $("#grid").dxDataGrid({
            dataSource: store,

            columns: [
                { dataField: "userId", caption: "User Id.", width: 100 },
                { dataField: "id", caption: "Post Id", width: 100 },
                { dataField: "title", caption: "Title", width: 400 },
                { dataField: "body", caption: "Post" }
            ],

            // Paging allows the UI component to load data in portions instead of loading it simultaneously. To enable paging, set the paging.enabled property to true.
            paging: {
                // Enables paging.
                enabled: true,

                // Specifies the page to be displayed using a zero-based index.
                pageIndex: 0,

                // Specifies the page size.
                pageSize: 10,
            },

            // Configures the pager.
            pager: {
                // Specifies the available page sizes in the page size selector.
                allowedPageSizes: [5, 10, 20, "all"],

                // Specifies the pager's display mode.
                // Accepted Values: 'adaptive' | 'compact' | 'full'
                // Default Value: 'adaptive'
                displayMode: "full",

                // Specifies the page information text.
                // Default Value: 'Page {0} of {1} ({2} items)'
                // {0} - shows the current page number.
                // {1} - shows the total page count.
                // {2} - shows the total row count.
                infoText: "Page {0} of {1} ({2} items)",

                // Specifies an aria-label attribute for the pager.
                label: "Page Navigation",

                // Specifies whether to show the page information.
                showInfo: true,

                // Specifies whether to show navigation buttons.
                showNavigationButtons: true,

                // Specifies page size selector visibility.
                // Default Value: 'auto'
                // When this property is set to "auto", the pager is hidden if pageSize is greater than itemCount. To avoid this behavior, set showPageSizeSelector to true.
                showPageSizeSelector: true,

                // Specifies whether the pager is visible.
                // The pager is only visible if paging is enabled and the total row count is greater than the pageSize property. If you choose a large page size (for example "All" supported in allowedPageSizes) and the data does not increase (for example, with state storing enabled), the pager is hidden permanently.
                visible: true,
            }
        })
    </script>
</body>
</html>
