<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <script src="../../Scripts/jquery-3.5.1.js"></script>
    <link rel="stylesheet" href="../../Content/dx.dark.css" />
    <script src="../../Scripts/dx.all.js"></script>
</head>
<body>
    <div id="grid"></div>

    <script>
        let store = new DevExpress.data.CustomStore({
            load: function (loadOptions) {
                return $.ajax({
                    url: "https://localhost:7051/api/Data/GetAllPost",
                    method: "GET"
                }).then((data) => {
                    return data;
                });
            },

            key: "id",
        });

        $("#grid").dxDataGrid({
            dataSource: store,

            columnAutoWidth: true,

            columns: [
                {
                    dataField: "userId",
                },
                {
                    dataField: "id"
                },
                {
                    dataField: "title"
                },
                {
                    dataField: "body"
                }
            ],

            summary: {
                totalItems: [
                    {
                        name: "mySum",
                        summaryType: "custom",
                        displayFormat: "Custom Sum: {0}",
                        showInColumn: "id"
                    }
                ],

                // options have component, groupIndex, name, summaryProcess, totalValue, value
                calculateCustomSummary: function (options) {
                    if (options.name === "mySum") {
                        if (options.summaryProcess === "start") {
                            options.totalValue = 0;
                        }

                        if (options.summaryProcess === "calculate") {
                            options.totalValue += options.value.id;
                        }
                    }
                }
            },

            searchPanel: {
                visible: true,
            },
            filterRow: {
                visible: true
            },
            sorting: {
                mode: "multiple"
            },
            stateStoring: {
                enabled: true,
                savingTimeout: 2000,
                storageKey: "gridState",
                type: "localStorage",
            },
        })
    </script>
</body>
</html>
