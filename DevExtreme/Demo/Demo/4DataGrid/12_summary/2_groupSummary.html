<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <script src="../../Scripts/jquery-3.5.1.js"></script>
    <link rel="stylesheet" href="../../Content/dx.dark.css" />
    <script src="../../Scripts/dx.all.js"></script>
</head>
<body>
    <div id="grid"></div>

    <script>
        let store = new DevExpress.data.CustomStore({
            load: function (loadOptions) {
                return $.ajax({
                    url: "https://localhost:7051/api/Data/GetAllPost",
                    method: "GET"
                }).then((data) => {
                    return data;
                });
            },

            key: "id",
        });

        $("#grid").dxDataGrid({
            dataSource: store,

            columnAutoWidth: true,

            columns: [
                {
                    dataField: "userId",
                    groupIndex: 0
                },
                {
                    dataField: "id"
                },
                {
                    dataField: "title"
                },
                {
                    dataField: "body"
                }
            ],

            summary: {

                // used for group summary
                groupItems: [
                    {
                        // by default summary is shown in header in parenthesis
                        // If this property is set to true for the first column of the grid, this setting is ignored
                        alignByColumn: true,
                        column: "id",
                        summaryType: "sum",
                        //customizeText:
                        //displayFormat
                        //name
                        showInColumn: "title",
                        showInGroupFooter: true,
                        //skipEmptyValues
                    },
                    {
                        column: "id",
                        summaryType: "max",
                        showInGroupFooter: true
                    }
                ]
            },

            searchPanel: {
                visible: true,
            },
            filterRow: {
                visible: true
            },
            sorting: {
                mode: "multiple"
            },
            stateStoring: {
                enabled: true,
                savingTimeout: 2000,
                storageKey: "gridState",
                type: "localStorage",
            },
        })
    </script>
</body>
</html>
