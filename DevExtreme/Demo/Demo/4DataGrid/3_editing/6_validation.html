<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <script src="../../Scripts/jquery-3.5.1.js"></script>
    <link rel="stylesheet" href="../../Content/dx.light.css" />
    <script src="../../Scripts/dx.all.js"></script>
</head>
<body>
    <div id="grid"></div>

    <script>
        let store = new DevExpress.data.CustomStore({
            load: function (loadOptions) {
                return $.ajax({
                    url: "https://localhost:7051/api/Data/GetAllPost",
                    method: "GET"
                }).then((data) => {
                    return data;
                });
            },

            insert: function (values) {
                return $.ajax({
                    url: "https://localhost:7051/api/Data/AddRow",
                    method: "POST",
                    data: JSON.stringify(values),
                    contentType: "application/json"
                });
            },

            key: "id",

            remove: function (key) {
                return $.ajax({
                    url: `https://localhost:7051/api/Data/DeleteRow?id=${key}`,
                    method: "DELETE"
                });
            },

            update: function (key, values) {
                const payload = {
                    id: key,
                    ...values,
                };

                return $.ajax({
                    url: "https://localhost:7051/api/Data/UpdateRow",
                    method: "PUT",
                    data: JSON.stringify(payload),
                    contentType: "application/json",
                })
            }
        });

        $("#grid").dxDataGrid({
            dataSource: store,

            columns: [
                {
                    dataField: "id",
                    caption: "Post Id",
                    width: 100,
                    allowEditing: false
                },
                {
                    dataField: "userId",
                    caption: "User Id.",
                    width: 100,
                    validationRules: [
                        {
                            type: "required",
                            message: "User id is required",
                            trim: false,
                        }
                    ],
                    editorOptions: {
                        validationMessageMode: "always",
                        ValidationMessagePosition: "right",
                    }
                },
                {
                    dataField: "title",
                    caption: "Title",
                    width: 400,
                    validationRules: [
                        {
                            type: "required",
                            message: "title is required",
                            trim: false,
                        }
                    ],
                    editorOptions: {
                        validationMessageMode: "always",
                        ValidationMessagePosition: "right",
                    }
                },
                {
                    dataField: "body",
                    caption: "Post",
                    validationRules: [
                        {
                            type: "required",
                            message: "body is required",
                            trim: false,
                        }
                    ],
                    editorOptions: {
                        validationMessageMode: "always",
                        ValidationMessagePosition: "right",
                    }
                }
            ],

            paging: {
                enabled: true,
                pageSize: 10,
            },

            pager: {
                allowedPageSizes: [5, 10, 20],
                showPageSizeSelector: true,
            },

            editing: {
                allowAdding: true,
                allowDeleting: true,
                allowUpdating: true,
                useIcons: true,
                mode: "popup",
            }
        });
    </script>
</body>
</html>
