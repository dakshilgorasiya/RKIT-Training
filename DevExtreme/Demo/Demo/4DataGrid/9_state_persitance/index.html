<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <script src="../../Scripts/jquery-3.5.1.js"></script>
    <link rel="stylesheet" href="../../Content/dx.light.css" />
    <script src="../../Scripts/dx.all.js"></script>
</head>
<body>
    <div id="grid"></div>

    <script>
        let store = new DevExpress.data.CustomStore({
            load: function (loadOptions) {
                return $.ajax({
                    url: "https://localhost:7051/api/User/GetAll",
                    method: "GET"
                }).then((data) => {
                    return data;
                });
            },

            key: "id",
        });

        $("#grid").dxDataGrid({
            dataSource: store,

            allowColumnReordering: true,
            allowColumnResizing: true,

            columnChooser: {
                enabled: true,

                // Accepted Values: 'dragAndDrop' | 'select'
                mode: "select",

                search: {
                    enabled: true,
                    editorOptions: {
                        placeholder: 'Search column',
                        mode: 'text',
                    }
                },

                selection: {
                    allowSelectAll: false,

                    recursive: true,

                    //  item becomes selected if a user clicks the item's label.
                    selectByClick: true,
                },

                title: "Column Chooser",
            },

            searchPanel: {
                visible: true,
            },

            filterRow: {
                visible: true
            },

            sorting: {
                mode: "multiple"
            },

            selection: {
                mode: "multiple",
            },

            // it can store filter, selection, sorting, pagination, search, column visible, column width
            stateStoring: {
                enabled: true, 

                //  delay in milliseconds between when a user makes a change and when this change is saved.
                savingTimeout: 2000, 

                storageKey: "gridState",

                // Accepted Values: 'custom' | 'localStorage' | 'sessionStorage'
                type: "localStorage",

                // set type to custom to use it
                //customLoad: function () {
                //    return $.ajax({
                //        url: "url",
                //        method: "GET"
                //    });
                //},

                //customSave: function (gridState) {
                //    console.log(gridState);
                //    return $.ajax({
                //        url: "URL",
                //        method: "GET",
                //    });
                //}
            },

            // We can create hirercical columns
            columns: [
                {
                    caption: "Basic Details",
                    alignment: "center",
                    columns: [
                        {
                            dataField: "id",
                            caption: "UserId",
                            width: 60,
                            alignment: "center"
                        },
                        {
                            dataField: "name",
                            caption: "Name",
                            width: 200
                        },
                        {
                            dataField: "userName",
                            caption: "Username",
                            width: 150,
                        },
                        {
                            dataField: "email",
                            caption: "Email",
                            width: 200,
                        },
                        {
                            dataField: "phone",
                            caption: "Phone",
                            width: 200
                        },
                        {
                            dataField: "webSite",
                            caption: "Website",
                            width: 130
                        }
                    ]
                },
                {
                    caption: "address",
                    alignment: "center",
                    columns: [
                        {
                            dataField: "address.street",
                            caption: "Street",
                            width: 150
                        },
                        {
                            dataField: "address.suite",
                            caption: "Suite",
                            width: 100
                        },
                        {
                            dataField: "address.city",
                            caption: "City",
                            width: 150
                        },
                        {
                            dataField: "address.zipCode",
                            caption: "ZipCode",
                            width: 100
                        },
                        {
                            caption: "Geo",
                            alignment: "center",
                            columns: [
                                {
                                    dataField: "address.geo.lat",
                                    caption: "Latitude",
                                    width: 90,
                                    alignment: "center"
                                },
                                {
                                    dataField: "address.geo.lng",
                                    caption: "Longtitude",
                                    width: 90,
                                    alignment: "center"
                                }
                            ]
                        }
                    ]
                },
                {
                    caption: "company",
                    alighment: "center",
                    columns: [
                        {
                            dataField: "company.name",
                            caption: "Name",
                            width: 150
                        },
                        {
                            dataField: "company.catchPhrase",
                            caption: "Catch Phrase",
                            width: 300
                        },
                        {
                            dataField: "company.bs",
                            caption: "Bs",
                            width: 300
                        }
                    ]
                }
            ],
        })
    </script>
</body>
</html>
