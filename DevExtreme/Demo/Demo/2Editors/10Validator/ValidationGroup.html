<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <script src="../../Scripts/jquery-3.5.1.js"></script>
    <link rel="stylesheet" href="../../Content/dx.light.css" />
    <script src="../../Scripts/dx.all.js"></script>
</head>
<body>
    <div id="email"></div>
    <div id="password"></div>
    <div id="btn"></div>
    <div id="summary"></div>

    <br />
    <br />

    <div id="getGroupConfig"></div>
    <div id="resetGroup"></div>
    <div id="validateGroup"></div>

    <script>
        $(() => {
            $("#email").dxTextBox({
                width: 400,
                label: "Email",
                labelMode: "floating",
                validationMessageMode: "always",
                validationMessagePosition: "right"
            }).dxValidator({
                validationGroup: "loginGroup",
                validationRules: [
                    {
                        type: "required",
                        message: "email is required"
                    },
                    {
                        type: "email",
                        message: "Invalid email format"
                    }
                ]
            });

            $("#password").dxTextBox({
                width: 400,
                label: "Password",
                labelMode: "floating",
                validationMessageMode: "always",
                validationMessagePosition: "right"
            }).dxValidator({
                validationGroup: "loginGroup",
                validationRules: [
                    {
                        type: "required",
                        message: "password is required"
                    }
                ]
            });

            $("#btn").dxButton({
                text: "Login",
                onClick: function () {
                    let res = DevExpress.validationEngine.validateGroup("loginGroup");
                    console.log(res); // { brokenRules, complete, isValid, status, validators }
                }
            });

            let summaryInstance = $("#summary").dxValidationSummary({
                elementAttr: {
                    id: "CustomID"
                },
                hoverStateEnabled: true,

                // An array of items displayed by the UI component.
                // Generally, the array of items is auto-generated when a validation result is ready. And if you set a custom array of items, it will be overridden by the auto-generated array. So use this property to read the current array of items. Alternatively, you can set the array of items generated by a custom validation engine.
                items: [
                    "email is must",
                    "password is must"
                ],

                // Specifies a custom template for items.
                //itemTemplate: function (item) {
                //    return $("<h3>").text(item);
                //},

                // onContentReady, onDisposing, onInitialized

                // A function that is executed when a collection item is clicked or tapped.
                // e has {itemIndex, itemElement, itemData, event, element, component}
                onItemClick: function (e) {
                    console.log("onItemClick");
                    console.log(e);
                },

                // Specifies the validation group for which summary should be generated.
                validationGroup: "loginGroup",
            }).dxValidationSummary("instance");

            // Resubscribes the ValidationSummary to a target ValidationGroup.
            // Use this method if target ValidationGroup is recreated.
            // Use this when we add, remove or update any element using javascript dynamically
            summaryInstance.refreshValidationGroup();


            // ValidationEngine
            $("#getGroupConfig").dxButton({
                text: "getGroupConfig",
                onClick: function (e) {

                    // The object returned by the getGroupConfig(group) function has the following structure.
                    // group: The string or object passed as the parameter.
                    // validators: An array of Validator UI components that are included to the validated group.
                    // validate(): The method that allows you to validate the UI components included to the current group.
                    // validated: The event that occurs after the group is validated. You can attach/detach a handler using the on(eventName, eventHandler)/off(eventName) methods of the group.
                    let res = DevExpress.validationEngine.getGroupConfig("loginGroup");
                    console.log(res);
                }
            });

            $("#resetGroup").dxButton({
                text: "resetGroup",
                onClick: function (e) {
                    // Resets the values and validation result of the editors that belong to the specified validation group.
                    DevExpress.validationEngine.resetGroup("loginGroup");
                }
            });

            $("#validateGroup").dxButton({
                text: "ValidateGroup",
                onClick: function () {
                    let res = DevExpress.validationEngine.validateGroup("loginGroup");
                    console.log(res); // { brokenRules, complete, isValid, status, validators }
                }
            });
        });
    </script>
</body>
</html>
